name: Discord Self-Bot 24/7

on:
  schedule:
    - cron: '0 */6 * * *'  # Automatically restarts every 6 hours
  workflow_dispatch:        # Allows you to click "Run workflow" manually

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 340    # Shuts down slightly before the next cron starts

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run bot
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        # -u forces logs to show up in real-time on GitHub
        run: python -u main.py
