name: Discord Self-Bot 24/7

on:
  schedule:
    - cron: '0 */6 * * *'  # Restarts every 6 hours
  workflow_dispatch:        # Manual start button

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350    # Stays alive for almost the full 6 hours

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Added websocket-client for the new dm_responder logic
          pip install requests websocket-client

      - name: Run bot
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        # -u: real-time logs
        # The script now uses a persistent connection
        run: python -u main.py
