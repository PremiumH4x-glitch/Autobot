name: Discord Self-Bot 24/7

on:
  schedule:
    - cron: '0 */6 * * *'  # Restart every 6 hours
  workflow_dispatch:        # Allow manual start

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 340    # Shut down just before the next cron starts

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install and Run Bot
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: |
          python -m pip install --upgrade pip
          pip install curl_cffi requests
          python -u main.py
