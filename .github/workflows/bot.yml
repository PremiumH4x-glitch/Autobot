name: Discord Self-Bot 24/7

on:
  schedule:
    - cron: '0 */6 * * *'  # Trigger every 6 hours
  workflow_dispatch:        # Allow manual start

jobs:
  run-bot:
    runs-on: ubuntu-latest
    # We set the timeout slightly shorter than the cron interval to avoid overlaps
    timeout-minutes: 340 

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # This caches your dependencies so the bot starts faster
          cache: 'pip' 

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install curl_cffi requests

      - name: Run bot
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        # We use unbuffered output so you can see the logs in real-time
        run: python -u main.py
